name: GreenTag
options:
  bundleIdPrefix: app.greentag
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Roboflow:
    url: https://github.com/roboflow/roboflow-swift
    exactVersion: "1.2.7"
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: "2.14.1"
targets:
  GreenTag:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Shared.xcconfig
      Release: Config/Shared.xcconfig
    sources:
      - GreenTag
      - Assets.xcassets
    dependencies:
      - package: Roboflow
      - package: LiveKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.greentag.GreenTag
        DEVELOPMENT_TEAM: KMD3DQSTQ5
        INFOPLIST_FILE: GreenTag/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: GreenTag/Info.plist
      properties:
        NSCameraUsageDescription: GreenTag uses the camera with ARKit to measure framing spacing during inspections.
        NSMicrophoneUsageDescription: GreenTag uses the microphone so you can talk with the AI inspector about code.
        NSLocalNetworkUsageDescription: GreenTag connects to the local hackathon agent during demos.
        ROBOFLOW_API_KEY: $(ROBOFLOW_API_KEY)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: true
  GreenTagTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GreenTagTests
    dependencies:
      - target: GreenTag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.greentag.GreenTagTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
